# learning-service.yml
server:
  port: 8083
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/learning_db
    username: root
    password: 2005@Kalyansai

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: my-super-secret-key-12345678901234567890

management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    hostname: learning-service
    prefer-ip-address: true
